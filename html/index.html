<h1 id="mainTitle">Khám Phá Nha Trang</h1>

<p id="welcomeText">
    Thành phố biển nổi tiếng với du lịch, ẩm thực và cảnh đẹp thiên nhiên.
</p>

<button id="helloBtn" class="primary-button">
    Nhấn để xem lời chào
</button>

<p id="helloResult"></p>

<button id="toggleAboutBtn" class="primary-button">
    Ẩn / Hiện Nội Dung
</button>

<div id="aboutContent">
    ...
</div>

<button id="menuToggle" class="menu-toggle">
    ☰ Menu
</button>

<nav id="mainMenu">
    ...
</nav>

<select id="themeSelect">
    <option value="">Giao diện mặc định</option>
    <option value="dark-mode">Nền tối</option>
    <option value="warm-mode">Nền ấm</option>
</select>

<input
    type="text"
    id="searchInput"
    placeholder="Nhập từ khóa..."
>

<button class="filter-btn" data-filter="all">Tất cả</button>
<button class="filter-btn" data-filter="travel">Du lịch</button>
<button class="filter-btn" data-filter="food">Ẩm thực</button>

<figure
    class="gallery-item search-item"
    data-category="travel">
</figure>

<form id="contactForm">

    <input
        type="text"
        id="fullName"
        placeholder="Họ và tên"
    >

    <input
        type="email"
        id="email"
        placeholder="Email"
    >

    <p id="formMessage"></p>

</form>
